<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2d1a0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MM Booking">
<title>Mayamunay Buchungen</title>
<link rel="manifest" href="data:application/json;charset=utf-8,{
  %22name%22:%22Mayamunay%20Pop-Up%20Buchungen%22,
  %22short_name%22:%22MM%20Buchungen%22,
  %22start_url%22:%22.%2Fbooking-mobile.html%22,
  %22display%22:%22standalone%22,
  %22background_color%22:%222d1a0e%22,
  %22theme_color%22:%222d1a0e%22,
  %22icons%22:[]
}">
<style>
:root {
  --brown-dark: #2d1a0e;
  --brown-mid: #4a2c1a;
  --gold: #ae8d31;
  --gold-light: #c9a86c;
  --ivory: #fff8f0;
  --cream: #f0e8d8;
  --beige: #e8dcc8;
  --green: #2d6a4f;
  --red: #8b3a2a;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--cream); color: var(--brown-dark); }

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

header {
  background: var(--brown-dark); color: var(--ivory);
  padding: env(safe-area-inset-top, 12px) 16px 12px;
  padding-top: max(env(safe-area-inset-top), 12px);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.01em; }
header h1 span { color: var(--gold-light); }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
.sync-dot.ok { background: #56d399; }
.sync-dot.err { background: #f08070; }

.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ── BOTTOM NAV ── */
nav {
  background: var(--brown-dark);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom, 0);
  flex-shrink: 0;
  border-top: 1px solid rgba(174,141,49,0.3);
}
nav button {
  flex: 1; background: none; border: none; color: rgba(255,248,240,0.5);
  font-size: 0.62rem; padding: 10px 4px 8px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: color 0.15s;
}
nav button.active { color: var(--gold-light); }
nav button svg { width: 22px; height: 22px; }

/* ── VIEWS ── */
.view { display: none; padding: 14px; }
.view.active { display: block; }

/* ── STATS ── */
.stats-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat { background: var(--ivory); border-radius: 10px; padding: 14px; border-left: 3px solid var(--gold); box-shadow: 0 1px 6px rgba(45,26,14,0.08); }
.stat .lbl { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gold); margin-bottom: 4px; }
.stat .val { font-size: 1.6rem; font-weight: 700; color: var(--brown-dark); line-height: 1; }
.stat .sub { font-size: 0.7rem; color: #7a6040; margin-top: 2px; }

/* ── COURSE CARDS ── */
.course-card {
  background: var(--ivory); border-radius: 10px; margin-bottom: 10px;
  box-shadow: 0 1px 6px rgba(45,26,14,0.08); overflow: hidden;
}
.course-card-header { background: var(--brown-dark); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.course-card-header .day { font-size: 0.7rem; color: var(--gold-light); }
.course-card-header .name { font-size: 0.95rem; font-weight: 600; color: var(--ivory); margin-top: 1px; }
.course-card-body { padding: 12px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.course-card-body .leader { font-size: 0.78rem; color: #7a6040; flex: 1; min-width: 100px; }
.course-card-body .booked { font-size: 0.85rem; font-weight: 600; }
.bar { height: 5px; background: var(--beige); border-radius: 3px; overflow: hidden; margin: 6px 0 0; }
.bar .fill { height: 100%; background: var(--gold); border-radius: 3px; }

.field-row { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #7a6040; }
.field-row label { min-width: 60px; }
input.inline { border: 1px solid var(--beige); border-radius: 5px; padding: 4px 7px; font-size: 0.82rem; background: white; color: var(--brown-dark); width: 70px; }
input.inline:focus { outline: none; border-color: var(--gold); }

/* ── PARTICIPANTS ── */
.course-selector { background: var(--ivory); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; box-shadow: 0 1px 6px rgba(45,26,14,0.08); }
.course-selector label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gold); display: block; margin-bottom: 6px; }
.course-selector select { width: 100%; border: 1px solid var(--beige); border-radius: 6px; padding: 8px 10px; font-size: 0.85rem; background: white; color: var(--brown-dark); }
.course-selector select:focus { outline: none; border-color: var(--gold); }

.p-stats { background: rgba(174,141,49,0.08); border-radius: 8px; padding: 10px 12px; font-size: 0.78rem; color: #7a6040; margin-bottom: 10px; line-height: 1.6; }
.p-stats strong { color: var(--gold); }

.p-card { background: var(--ivory); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 6px rgba(45,26,14,0.08); }
.p-card .p-name { font-size: 0.92rem; font-weight: 600; margin-bottom: 2px; }
.p-card .p-email { font-size: 0.75rem; color: #7a6040; margin-bottom: 8px; }
.p-card .p-actions { display: flex; align-items: center; gap: 10px; }

.toggle-paid { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.toggle-paid input { display: none; }
.toggle-pill { background: var(--beige); border-radius: 20px; padding: 4px 12px; font-size: 0.72rem; font-weight: 700; color: #8b3a2a; transition: 0.15s; }
.toggle-paid input:checked + .toggle-pill { background: #d4edda; color: #2d6a4f; }

.btn-remove { background: none; border: none; color: #c09070; font-size: 1.1rem; cursor: pointer; padding: 4px 6px; line-height: 1; margin-left: auto; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(env(safe-area-inset-bottom) + 68px); right: 18px;
  width: 52px; height: 52px; border-radius: 50%; background: var(--gold);
  color: var(--brown-dark); border: none; font-size: 1.5rem; cursor: pointer;
  box-shadow: 0 4px 14px rgba(45,26,14,0.25); display: none; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.92); }
.fab.visible { display: flex; }

/* ── MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(45,26,14,0.55); z-index: 100; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet { background: var(--ivory); border-radius: 18px 18px 0 0; width: 100%; padding: 20px 18px calc(env(safe-area-inset-bottom) + 20px); max-height: 85vh; overflow-y: auto; }
.sheet h3 { font-size: 1.05rem; margin-bottom: 16px; color: var(--brown-dark); }
.fg { margin-bottom: 12px; }
.fg label { display: block; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gold); margin-bottom: 5px; }
.fg input, .fg textarea { width: 100%; border: 1px solid var(--beige); border-radius: 7px; padding: 9px 11px; font-size: 0.9rem; background: white; color: var(--brown-dark); font-family: inherit; }
.fg input:focus, .fg textarea:focus { outline: none; border-color: var(--gold); }
.fg .check-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; }
.fg .check-row input { width: auto; }
.fg .check-row span { font-size: 0.88rem; }
.sheet-actions { display: flex; gap: 10px; margin-top: 16px; }
.sheet-actions button { flex: 1; padding: 13px; border: none; border-radius: 9px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
.sheet-actions .cancel { background: var(--beige); color: var(--brown-dark); }
.sheet-actions .confirm { background: var(--gold); color: var(--brown-dark); }

/* ── SETTINGS ── */
.settings-card { background: var(--ivory); border-radius: 10px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 6px rgba(45,26,14,0.08); }
.settings-card h3 { font-size: 0.9rem; margin-bottom: 4px; }
.settings-card p { font-size: 0.75rem; color: #7a6040; line-height: 1.5; margin-bottom: 12px; }
.settings-card input { width: 100%; border: 1px solid var(--beige); border-radius: 6px; padding: 8px 10px; font-size: 0.82rem; background: white; color: var(--brown-dark); margin-bottom: 8px; }
.settings-card input:focus { outline: none; border-color: var(--gold); }
.settings-msg { font-size: 0.75rem; color: var(--gold); margin-top: 8px; min-height: 16px; }

.btn-full { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 0.88rem; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
.btn-gold { background: var(--gold); color: var(--brown-dark); }
.btn-beige { background: var(--beige); color: var(--brown-dark); }
.btn-red { background: var(--red); color: white; }

/* ── TOAST ── */
.toast { position: fixed; top: max(env(safe-area-inset-top), 60px); left: 50%; transform: translateX(-50%); background: var(--brown-dark); color: var(--ivory); padding: 10px 18px; border-radius: 20px; font-size: 0.82rem; z-index: 200; opacity: 0; transition: opacity 0.25s; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; }

.empty { text-align: center; padding: 32px 16px; color: #9a7a50; font-size: 0.85rem; }
.section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gold); margin-bottom: 10px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Mayamunay · <span>Pop-Up</span></h1>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="sync-dot" class="sync-dot"></span>
      <button onclick="syncNow()" style="background:none;border:1px solid rgba(174,141,49,0.4);color:var(--gold-light);border-radius:5px;padding:4px 10px;font-size:0.7rem;cursor:pointer">Sync</button>
    </div>
  </header>

  <div class="content" id="main-content">

    <!-- DASHBOARD -->
    <div id="view-dash" class="view active">
      <div class="stats-2" id="stat-cards"></div>
      <div class="section-title">Kursauslastung</div>
      <div id="course-bars"></div>
    </div>

    <!-- KURSE -->
    <div id="view-kurse" class="view">
      <div class="section-title">Alle Kurse · Preise & Kapazitäten</div>
      <div id="course-cards"></div>
    </div>

    <!-- TEILNEHMER -->
    <div id="view-tn" class="view">
      <div class="course-selector">
        <label>Kurs auswählen</label>
        <select id="tn-select" onchange="renderTN()"></select>
      </div>
      <div class="p-stats" id="tn-stats"></div>
      <div id="tn-list"></div>
    </div>

    <!-- SETTINGS -->
    <div id="view-settings" class="view">
      <div class="settings-card">
        <h3>GitHub Gist Sync</h3>
        <p>Trage Token und Gist-ID ein (vom Desktop einrichten) – dann sind beide Geräte synchron.</p>
        <input type="password" id="s-token" placeholder="github_pat_...">
        <input type="text" id="s-gist" placeholder="Gist ID (aus Desktop-App)">
        <button class="btn-full btn-gold" onclick="saveSettings()">Verbinden</button>
        <button class="btn-full btn-beige" onclick="testConn()">Verbindung testen</button>
        <div class="settings-msg" id="s-msg"></div>
      </div>
      <div class="settings-card">
        <h3>Daten zurücksetzen</h3>
        <p>Alle Buchungen und Preisänderungen löschen.</p>
        <button class="btn-full btn-red" onclick="resetData()">Zurücksetzen</button>
      </div>
    </div>

  </div>

  <nav>
    <button class="active" onclick="showView('dash')" id="nav-dash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button onclick="showView('kurse')" id="nav-kurse">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Kurse
    </button>
    <button onclick="showView('tn')" id="nav-tn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Teilnehmer
    </button>
    <button onclick="showView('settings')" id="nav-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Einstellungen
    </button>
  </nav>
</div>

<button class="fab" id="fab" onclick="openSheet()">+</button>

<!-- BOTTOM SHEET (Add Participant) -->
<div class="overlay" id="sheet-overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <h3>Teilnehmer hinzufügen</h3>
    <div class="fg"><label>Name *</label><input id="m-name" type="text" placeholder="Vorname Nachname" autocomplete="name"></div>
    <div class="fg"><label>E-Mail</label><input id="m-email" type="email" placeholder="email@beispiel.de" autocomplete="email"></div>
    <div class="fg"><label>Notiz</label><textarea id="m-note" rows="2" placeholder="Besonderheiten..."></textarea></div>
    <div class="fg"><div class="check-row"><input id="m-paid" type="checkbox"><span>Bereits bezahlt</span></div></div>
    <div class="sheet-actions">
      <button class="cancel" onclick="closeSheet()">Abbrechen</button>
      <button class="confirm" onclick="addParticipant()">Hinzufügen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_COURSES = [
  { id:1,  day:"Mo 8.6.", time:"10–13", name:"Eröffnung",                       leader:"Mayamunay",          price:0,  capacity:50, participants:[] },
  { id:2,  day:"Mo 8.6.", time:"14–17", name:"Playfight",                        leader:"Kendra & Gabriel",   price:25, capacity:20, participants:[] },
  { id:3,  day:"Mo 8.6.", time:"19–22", name:"Bhajan Singen",                    leader:"San Koch",           price:22, capacity:30, participants:[] },
  { id:4,  day:"Di 9.6.", time:"9–10",  name:"Faszien Flow",                     leader:"Yilmaz Koshua",      price:15, capacity:20, participants:[] },
  { id:5,  day:"Di 9.6.", time:"10–13", name:"Wasser, Reise & Zyklusarbeit",     leader:"Kai, Louit & Greta", price:30, capacity:25, participants:[] },
  { id:6,  day:"Di 9.6.", time:"14–17", name:"Contact Improvisation",            leader:"San Koch",           price:25, capacity:20, participants:[] },
  { id:7,  day:"Di 9.6.", time:"19–22", name:"Klangreise & Frei-Singen",         leader:"Kai, Louit & Greta", price:28, capacity:25, participants:[] },
  { id:8,  day:"Mi 10.6.",time:"9–10",  name:"Faszien Flow",                     leader:"Yilmaz Koshua",      price:15, capacity:20, participants:[] },
  { id:9,  day:"Do 11.6.",time:"9–10",  name:"Faszien Flow",                     leader:"Yilmaz Koshua",      price:15, capacity:20, participants:[] },
  { id:10, day:"Do 11.6.",time:"14–17", name:"Kundalini Yoga",                   leader:"Nadin Adesh",        price:28, capacity:20, participants:[] },
  { id:11, day:"Do 11.6.",time:"19–22", name:"Maya Munay Community Event",       leader:"Mayamunay",          price:0,  capacity:40, participants:[] },
  { id:12, day:"Fr 12.6.",time:"9–10",  name:"Faszien Flow",                     leader:"Yilmaz Koshua",      price:15, capacity:20, participants:[] },
  { id:13, day:"Fr 12.6.",time:"14–17", name:"Weibliche Souveränität",           leader:"Kristina Ebel",      price:35, capacity:15, participants:[] },
  { id:14, day:"Fr 12.6.",time:"19–22", name:"Vokale Gruppen-Improvisation",     leader:"Doro",               price:22, capacity:25, participants:[] },
  { id:15, day:"Sa 13.6.",time:"9–10",  name:"Faszien Flow",                     leader:"Yilmaz Koshua",      price:15, capacity:20, participants:[] },
  { id:16, day:"Sa 13.6.",time:"10–13", name:"Face Yoga",                        leader:"Nadine",             price:30, capacity:15, participants:[] },
  { id:17, day:"Sa 13.6.",time:"14–17", name:"Mevlut Vortrag",                   leader:"Mevlut",             price:20, capacity:30, participants:[] },
  { id:18, day:"Sa 13.6.",time:"19–22", name:"Maya Munay Abend",                 leader:"Mayamunay",          price:30, capacity:40, participants:[] },
  { id:19, day:"So 14.6.",time:"9–10",  name:"Faszien Flow",                     leader:"Yilmaz Koshua",      price:15, capacity:20, participants:[] },
  { id:20, day:"So 14.6.",time:"10–13", name:"Fluent Heart – Cacao & Fluentbody",leader:"Elli Steiger",       price:35, capacity:20, participants:[] },
  { id:21, day:"So 14.6.",time:"19–22", name:"Kakao Konzert",                    leader:"Mayamunay",          price:30, capacity:40, participants:[] },
];

let COURSES = [];
let selId = 1;
let ghToken = '', ghGist = '';
const GH_API = 'https://api.github.com';
const GIST_FILE = 'mayamunay-bookings.json';

// ── INIT ──
function init() {
  const s = localStorage.getItem('mm_courses');
  COURSES = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_COURSES));
  ghToken = localStorage.getItem('mm_gh_token') || '';
  ghGist  = localStorage.getItem('mm_gh_gist')  || '';
  if (ghToken) document.getElementById('s-token').value = ghToken;
  if (ghGist)  document.getElementById('s-gist').value  = ghGist;
  if (ghToken && ghGist) { setSyncDot('loading'); loadFromGist().then(ok => setSyncDot(ok ? 'ok' : 'err')); }
  renderDash(); renderTNSelect();
}

// ── GITHUB ──
async function loadFromGist() {
  if (!ghToken || !ghGist) return false;
  try {
    const r = await fetch(`${GH_API}/gists/${ghGist}`, { headers: { Authorization: `token ${ghToken}` } });
    if (!r.ok) return false;
    const d = await r.json();
    const f = d.files[GIST_FILE];
    if (!f) return false;
    const parsed = JSON.parse(f.content);
    if (parsed.courses) { COURSES = parsed.courses; saveLocal(); refreshView(); }
    return true;
  } catch { return false; }
}

async function saveToGist() {
  saveLocal();
  if (!ghToken || !ghGist) return false;
  try {
    const r = await fetch(`${GH_API}/gists/${ghGist}`, {
      method: 'PATCH',
      headers: { Authorization: `token ${ghToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify({ courses: COURSES, updated: new Date().toISOString() }, null, 2) } } })
    });
    return r.ok;
  } catch { return false; }
}

async function syncNow() {
  setSyncDot('loading');
  const ok = await saveToGist();
  setSyncDot(ok ? 'ok' : (ghToken ? 'err' : 'neutral'));
  toast(ok ? 'Sync OK ✓' : (ghToken ? 'Sync fehlgeschlagen' : 'Lokal gespeichert'));
}

function setSyncDot(state) {
  const d = document.getElementById('sync-dot');
  d.className = 'sync-dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
}

function saveLocal() { localStorage.setItem('mm_courses', JSON.stringify(COURSES)); }
let syncTimer;
function autoSync() { saveLocal(); clearTimeout(syncTimer); syncTimer = setTimeout(() => saveToGist().then(ok => setSyncDot(ok?'ok':(ghToken?'err':'neutral'))), 2500); }

// ── SETTINGS ──
function saveSettings() {
  ghToken = document.getElementById('s-token').value.trim();
  ghGist  = document.getElementById('s-gist').value.trim();
  localStorage.setItem('mm_gh_token', ghToken);
  localStorage.setItem('mm_gh_gist',  ghGist);
  if (ghToken && ghGist) {
    setSyncDot('loading');
    loadFromGist().then(ok => { setSyncDot(ok?'ok':'err'); smsg(ok?'✓ Verbunden & Daten geladen':'✗ Verbindungsfehler'); });
  }
}
async function testConn() {
  const tok = document.getElementById('s-token').value.trim();
  const gid = document.getElementById('s-gist').value.trim();
  if (!tok || !gid) { smsg('Token und Gist ID eingeben.'); return; }
  smsg('Teste...');
  const r = await fetch(`${GH_API}/gists/${gid}`, { headers: { Authorization: `token ${tok}` } });
  smsg(r.ok ? '✓ Verbindung OK!' : `✗ Fehler ${r.status}`);
}
function smsg(m) { document.getElementById('s-msg').textContent = m; }
function resetData() {
  if (!confirm('Alle Buchungen löschen?')) return;
  COURSES = JSON.parse(JSON.stringify(DEFAULT_COURSES));
  saveLocal(); toast('Zurückgesetzt.'); refreshView();
}

// ── NAVIGATION ──
let currentView = 'dash';
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  document.getElementById('fab').classList.toggle('visible', v === 'tn');
  currentView = v;
  document.getElementById('main-content').scrollTop = 0;
  if (v === 'dash') renderDash();
  if (v === 'kurse') renderKurse();
  if (v === 'tn') renderTNSelect();
}
function refreshView() { showView(currentView); }

// ── DASHBOARD ──
function renderDash() {
  const total = COURSES.reduce((s,c)=>s+c.participants.length, 0);
  const paid  = COURSES.reduce((s,c)=>s+c.participants.filter(p=>p.paid).length*c.price, 0);
  const exp   = COURSES.reduce((s,c)=>s+c.participants.length*c.price, 0);
  const cap   = COURSES.reduce((s,c)=>s+c.capacity, 0);
  document.getElementById('stat-cards').innerHTML = `
    <div class="stat"><div class="lbl">Buchungen</div><div class="val">${total}</div><div class="sub">/ ${cap} Plätze</div></div>
    <div class="stat"><div class="lbl">Eingegangen</div><div class="val">${paid}€</div><div class="sub">bezahlt</div></div>
    <div class="stat"><div class="lbl">Erwartet</div><div class="val">${exp}€</div><div class="sub">bei Buchungen</div></div>
    <div class="stat"><div class="lbl">Offen</div><div class="val">${exp-paid}€</div><div class="sub">ausstehend</div></div>`;
  document.getElementById('course-bars').innerHTML = COURSES.map(c => {
    const p = c.capacity ? Math.round(c.participants.length/c.capacity*100) : 0;
    return `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:0.72rem;margin-bottom:3px">
        <span style="color:var(--brown-dark)">${c.day} · ${c.name}</span>
        <span style="color:#7a6040">${c.participants.length}/${c.capacity}</span>
      </div>
      <div class="bar"><div class="fill" style="width:${p}%"></div></div>
    </div>`;
  }).join('');
}

// ── KURSE ──
function renderKurse() {
  document.getElementById('course-cards').innerHTML = COURSES.map(c => `
    <div class="course-card">
      <div class="course-card-header">
        <div>
          <div class="day">${c.day} · ${c.time} Uhr</div>
          <div class="name">${c.name}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:0.7rem;color:var(--gold-light)">${c.leader}</div>
          <div style="font-size:1rem;color:white;font-weight:700;margin-top:2px">${c.participants.length}<span style="font-size:0.7rem;font-weight:400;color:rgba(255,248,240,0.5)">/${c.capacity}</span></div>
        </div>
      </div>
      <div class="course-card-body">
        <div class="field-row" style="width:100%">
          <label>Preis €</label>
          <input class="inline" type="number" value="${c.price}" min="0" onchange="updCourse(${c.id},'price',parseFloat(this.value)||0);autoSync()">
          <label style="margin-left:12px">Max</label>
          <input class="inline" type="number" value="${c.capacity}" min="1" onchange="updCourse(${c.id},'capacity',parseInt(this.value)||1);autoSync()">
        </div>
      </div>
      <div style="padding:0 14px 10px"><div class="bar"><div class="fill" style="width:${c.capacity?Math.round(c.participants.length/c.capacity*100):0}%"></div></div></div>
    </div>`).join('');
}

function updCourse(id, k, v) { const c=COURSES.find(x=>x.id===id); if(c) c[k]=v; }

// ── TEILNEHMER ──
function renderTNSelect() {
  const sel = document.getElementById('tn-select');
  sel.innerHTML = COURSES.map(c => `<option value="${c.id}" ${c.id===selId?'selected':''}>${c.day} ${c.time} · ${c.name}</option>`).join('');
  renderTN();
}

function renderTN() {
  const v = parseInt(document.getElementById('tn-select').value);
  if (v) selId = v;
  const c = COURSES.find(x => x.id===selId);
  if (!c) return;
  const paid = c.participants.filter(p=>p.paid).length;
  document.getElementById('tn-stats').innerHTML = `<strong>${c.participants.length}</strong> Teilnehmer · <strong>${paid}</strong> bezahlt · <strong>${paid*c.price}€</strong> eingegangen`;
  const list = document.getElementById('tn-list');
  if (!c.participants.length) { list.innerHTML = '<div class="empty">Noch keine Teilnehmer.</div>'; return; }
  list.innerHTML = c.participants.map((p,i) => `
    <div class="p-card">
      <div class="p-name">${esc(p.name)}</div>
      <div class="p-email">${esc(p.email||'Keine E-Mail')}</div>
      <div class="p-actions">
        <label class="toggle-paid">
          <input type="checkbox" ${p.paid?'checked':''} onchange="togglePaid(${c.id},${i},this.checked)">
          <span class="toggle-pill">${p.paid?'✓ Bezahlt':'Offen'}</span>
        </label>
        <button class="btn-remove" onclick="removeTN(${c.id},${i})">✕</button>
      </div>
    </div>`).join('');
}

function togglePaid(cid,i,v) { COURSES.find(c=>c.id===cid).participants[i].paid=v; renderTN(); autoSync(); }
function removeTN(cid,i) {
  const c=COURSES.find(x=>x.id===cid);
  if (!confirm(`"${c.participants[i].name}" entfernen?`)) return;
  c.participants.splice(i,1); renderTN(); autoSync();
}

// ── SHEET (add participant) ──
function openSheet() { document.getElementById('sheet-overlay').classList.add('open'); setTimeout(()=>document.getElementById('m-name').focus(),100); }
function closeSheet() { document.getElementById('sheet-overlay').classList.remove('open'); }
function addParticipant() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('Name erforderlich.'); return; }
  const c = COURSES.find(x=>x.id===selId);
  if (c.participants.length >= c.capacity && !confirm('Kurs voll. Trotzdem?')) return;
  c.participants.push({ name, email:document.getElementById('m-email').value.trim(), note:document.getElementById('m-note').value.trim(), paid:document.getElementById('m-paid').checked, addedAt:new Date().toISOString() });
  closeSheet(); renderTN(); autoSync();
  toast(name + ' hinzugefügt ✓');
  ['m-name','m-email','m-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-paid').checked=false;
}

// ── UTILS ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let tt;
function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),2500); }

// ── START ──
init();
</script>
</body>
</html>
